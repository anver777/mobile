<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#02030a" />
    <title>NEON// FINANCE — доходы, цели, заметки</title>
    <meta
      name="description"
      content="Кибер-неоновый трекер доходов, целей и заметок. Работает офлайн, данные хранятся локально."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;700;800;900&family=Share+Tech+Mono&family=Rajdhani:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0' stop-color='%2300f0ff'/%3E%3Cstop offset='1' stop-color='%23ff00d4'/%3E%3C/linearGradient%3E%3C/defs%3E%3Cpath fill='url(%23g)' d='M16 2 L28 9 L28 23 L16 30 L4 23 L4 9 Z'/%3E%3C/svg%3E"
    />
  </head>
  <body>
    <!-- Animated backdrop layers -->
    <div class="scene" aria-hidden="true">
      <div class="scene-sky"></div>
      <div class="scene-sun"></div>
      <div class="scene-grid"></div>
      <div class="scene-scan"></div>
      <div class="scene-noise"></div>
    </div>

    <!-- HEADER -->
    <header class="app-header">
      <div class="wrap header-row">
        <a class="brand" href="#" data-glitch="NEON//FINANCE" aria-label="NEON FINANCE">
          <svg class="brand-mark" viewBox="0 0 32 32" aria-hidden="true">
            <defs>
              <linearGradient id="hexg" x1="0" y1="0" x2="1" y2="1">
                <stop offset="0" stop-color="#00f0ff" />
                <stop offset="1" stop-color="#ff00d4" />
              </linearGradient>
            </defs>
            <path
              d="M16 2 L28 9 L28 23 L16 30 L4 23 L4 9 Z"
              fill="none"
              stroke="url(#hexg)"
              stroke-width="2"
            />
            <path d="M11 20 L16 10 L21 20 M13 17 H19" fill="none" stroke="#00f0ff" stroke-width="1.6" stroke-linecap="round" />
          </svg>
          <span class="brand-text">NEON<span class="brand-slash">//</span>FINANCE</span>
        </a>

        <div class="header-actions">
          <button class="icon-btn" id="btn-export" title="Экспорт JSON" aria-label="Экспорт">
            <svg viewBox="0 0 24 24"><path d="M12 3v12m0 0l-4-4m4 4l4-4M4 21h16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
          <button class="icon-btn" id="btn-import" title="Импорт JSON" aria-label="Импорт">
            <svg viewBox="0 0 24 24"><path d="M12 21V9m0 0l-4 4m4-4l4 4M4 3h16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
          <button class="icon-btn" id="btn-settings" title="Настройки" aria-label="Настройки">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3" fill="none" stroke="currentColor" stroke-width="2"/><path d="M19.4 15a1.7 1.7 0 0 0 .3 1.9l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.7 1.7 0 0 0-1.9-.3 1.7 1.7 0 0 0-1 1.5V21a2 2 0 1 1-4 0v-.1a1.7 1.7 0 0 0-1.1-1.5 1.7 1.7 0 0 0-1.9.3l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.7 1.7 0 0 0 .3-1.9 1.7 1.7 0 0 0-1.5-1H3a2 2 0 1 1 0-4h.1a1.7 1.7 0 0 0 1.5-1.1 1.7 1.7 0 0 0-.3-1.9l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1a1.7 1.7 0 0 0 1.9.3H9a1.7 1.7 0 0 0 1-1.5V3a2 2 0 1 1 4 0v.1a1.7 1.7 0 0 0 1 1.5 1.7 1.7 0 0 0 1.9-.3l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.7 1.7 0 0 0-.3 1.9V9c.3.6.9 1 1.5 1H21a2 2 0 1 1 0 4h-.1a1.7 1.7 0 0 0-1.5 1z" fill="none" stroke="currentColor" stroke-width="2"/></svg>
          </button>
          <input id="import-file" type="file" accept="application/json" hidden />
        </div>
      </div>
    </header>

    <!-- HERO STATS -->
    <section class="wrap hero">

      <div class="stat-grid">
        <button class="stat" data-nav="incomes" data-c="cyan">
          <div class="stat-icon">
            <svg viewBox="0 0 24 24"><path d="M4 17l6-6 4 4 6-8" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M14 7h6v6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </div>
          <span class="stat-label mono">TOTAL // INCOME</span>
          <span class="stat-value" id="stat-income">0 ₽</span>
        </button>
        <button class="stat" data-nav="expenses" data-c="red">
          <div class="stat-icon">
            <svg viewBox="0 0 24 24"><path d="M4 7l6 6 4-4 6 8" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M14 17h6v-6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </div>
          <span class="stat-label mono">TOTAL // EXPENSE</span>
          <span class="stat-value" id="stat-expense">0 ₽</span>
        </button>
        <button class="stat" data-nav="analytics" data-c="amber">
          <div class="stat-icon">
            <svg viewBox="0 0 24 24"><path d="M12 3v18M5 8l7-5 7 5M5 16l7 5 7-5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </div>
          <span class="stat-label mono">NET // BALANCE</span>
          <span class="stat-value" id="stat-balance">0 ₽</span>
        </button>
        <button class="stat" data-nav="goals" data-c="magenta">
          <div class="stat-icon">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="2"/><circle cx="12" cy="12" r="4" fill="none" stroke="currentColor" stroke-width="2"/><circle cx="12" cy="12" r="1" fill="currentColor"/></svg>
          </div>
          <span class="stat-label mono">GOALS // PROGRESS</span>
          <span class="stat-value" id="stat-goals">0%</span>
        </button>
        <button class="stat" data-nav="notes" data-c="lime">
          <div class="stat-icon">
            <svg viewBox="0 0 24 24"><path d="M6 3h9l5 5v13H6z" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/><path d="M14 3v6h6" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/></svg>
          </div>
          <span class="stat-label mono">NOTES // COUNT</span>
          <span class="stat-value" id="stat-notes">0</span>
        </button>
      </div>
    </section>

    <!-- SEGMENTED NAV (top on desktop) -->
    <nav class="wrap segmented" role="tablist" aria-label="Разделы">
      <button class="seg" data-nav="incomes" data-c="cyan" role="tab">Доходы</button>
      <button class="seg" data-nav="expenses" data-c="red" role="tab">Расходы</button>
      <button class="seg" data-nav="goals" data-c="magenta" role="tab">Цели</button>
      <button class="seg" data-nav="notes" data-c="lime" role="tab">Заметки</button>
      <button class="seg" data-nav="analytics" data-c="amber" role="tab">Аналитика</button>
    </nav>

    <!-- MAIN -->
    <main class="wrap main" id="main"></main>

    <!-- MOBILE BOTTOM NAV -->
    <nav class="dock" aria-label="Навигация">
      <button class="dock-btn" data-nav="incomes" data-c="cyan">
        <svg viewBox="0 0 24 24"><path d="M4 17l6-6 4 4 6-8M14 7h6v6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <span>Доходы</span>
      </button>
      <button class="dock-btn" data-nav="expenses" data-c="red">
        <svg viewBox="0 0 24 24"><path d="M4 7l6 6 4-4 6 8M14 17h6v-6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <span>Расходы</span>
      </button>
      <button class="dock-btn" data-nav="goals" data-c="magenta">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="2"/><circle cx="12" cy="12" r="4" fill="none" stroke="currentColor" stroke-width="2"/><circle cx="12" cy="12" r="1" fill="currentColor"/></svg>
        <span>Цели</span>
      </button>
      <button class="dock-btn" data-nav="notes" data-c="lime">
        <svg viewBox="0 0 24 24"><path d="M6 3h9l5 5v13H6z" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/><path d="M14 3v6h6" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/></svg>
        <span>Заметки</span>
      </button>
      <button class="dock-btn" data-nav="analytics" data-c="amber">
        <svg viewBox="0 0 24 24"><path d="M4 20V10m5 10V4m5 16v-8m5 8V8" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        <span>Аналитика</span>
      </button>
    </nav>

    <!-- MODAL SHELL -->
    <div class="modal" id="modal" hidden>
      <div class="modal-backdrop" data-close></div>
      <div class="modal-panel" role="dialog" aria-modal="true" aria-labelledby="modal-title">
        <div class="modal-head">
          <h3 id="modal-title" class="mono"></h3>
          <button class="icon-btn" data-close aria-label="Закрыть">
            <svg viewBox="0 0 24 24"><path d="M6 6l12 12M18 6L6 18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          </button>
        </div>
        <div class="modal-body" id="modal-body"></div>
      </div>
    </div>

    <!-- TOAST -->
    <div class="toast" id="toast" hidden></div>

    <script src="./app.js"></script>
  </body>
</html>
